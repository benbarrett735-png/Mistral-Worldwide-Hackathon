<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Louise</title>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #fff; color: #111;
    }

    #map { position: absolute; inset: 0; z-index: 0; }

    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      padding: max(12px, env(safe-area-inset-top)) 16px 0;
    }
    .search-card {
      background: #fff; border-radius: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.04);
      display: flex; align-items: center; padding: 0 16px; height: 50px;
      gap: 10px; transition: box-shadow 0.2s;
    }
    .search-card:focus-within { box-shadow: 0 4px 20px rgba(0,0,0,0.14), 0 0 0 2px #111; }
    .search-icon { color: #999; font-size: 16px; flex-shrink: 0; }
    .search-icon svg { width: 18px; height: 18px; stroke: #999; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .search-card input {
      border: none; outline: none; flex: 1; font-size: 15px;
      font-family: inherit; color: #111; background: transparent; min-width: 0;
    }
    .search-card input::placeholder { color: #aaa; }
    .search-clear {
      display: none; background: none; border: none; cursor: pointer;
      font-size: 18px; color: #999; padding: 4px;
    }
    .search-results {
      display: none; background: #fff; border-radius: 14px; margin-top: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-height: 240px; overflow-y: auto;
    }
    .search-result {
      padding: 12px 16px; cursor: pointer; font-size: 14px;
      color: #333; border-bottom: 1px solid #f3f3f3;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:active { background: #f5f5f5; }
    .search-result .sr-icon { color: #999; font-size: 14px; margin-top: 1px; flex-shrink: 0; }
    .search-result .sr-name { font-weight: 500; }
    .search-result .sr-addr { font-size: 12px; color: #999; margin-top: 2px; }
    .search-status {
      padding: 14px 16px; font-size: 14px; color: #666;
      border-bottom: 1px solid #f3f3f3;
    }

    .bottom-sheet {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: #fff; border-radius: 18px 18px 0 0;
      box-shadow: 0 -2px 20px rgba(0,0,0,0.06);
      padding: 0 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      transition: transform 0.3s ease;
      max-height: 60vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-handle {
      width: 32px; height: 4px; border-radius: 2px;
      background: #ddd; margin: 10px auto 0;
    }
    .sheet-content { padding: 14px 0 4px; }

    .loc-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid #f3f3f3;
    }
    .loc-row:last-child { border-bottom: none; }
    .loc-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0; border: 2px solid;
    }
    .loc-dot.origin { border-color: #111; background: #e5e5e5; }
    .loc-dot.dest { border-color: #555; background: #f0f0f0; }
    .loc-label { font-size: 14px; color: #333; flex: 1; min-width: 0; }
    .loc-label.placeholder { color: #aaa; }
    .loc-change {
      font-size: 13px; color: #111; font-weight: 500; cursor: pointer;
      background: none; border: none; padding: 4px 8px; flex-shrink: 0;
      text-decoration: underline; text-underline-offset: 2px;
    }

    .route-info {
      background: #fafafa; border-radius: 10px; padding: 12px 14px;
      margin: 10px 0; font-size: 13px; color: #666; line-height: 1.6;
      border: 1px solid #eee;
    }
    .route-info strong { color: #111; }

    .eta-card {
      background: #fafafa; border: 1px solid #eee;
      border-radius: 10px; padding: 16px; margin: 10px 0; text-align: center;
    }
    .eta-time {
      font-size: 26px; font-weight: 800; color: #111;
      letter-spacing: -0.02em;
    }
    .eta-label { font-size: 12px; color: #888; margin-top: 4px; }

    .btn {
      display: block; width: 100%; padding: 14px; margin: 6px 0;
      font-size: 15px; font-weight: 600; border: none; border-radius: 12px;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      min-height: 48px; -webkit-tap-highlight-color: transparent;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary { background: #111; color: #fff; }
    .btn-go { background: #111; color: #fff; font-size: 16px; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-outline {
      background: #fff; color: #666;
      border: 1px solid #ddd; font-weight: 500;
    }

    .drone-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; margin: 8px 0;
      background: #fafafa; border: 1px solid #eee;
      border-radius: 10px;
    }
    .drone-card .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #111; flex-shrink: 0;
      animation: pulse 1.5s infinite;
    }
    .drone-card .drone-text { flex: 1; font-size: 13px; color: #111; font-weight: 500; }
    .drone-card .drone-sub { font-size: 12px; color: #888; margin-top: 2px; font-weight: 400; }
    .drone-card .live-badge {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: #111; background: #eee;
      padding: 2px 7px; border-radius: 4px; display: none;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }
    @keyframes dronePulse { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); } 50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(34,197,94,0); } }

    .distress-box {
      background: #fff; border: 1px solid #dc2626;
      border-radius: 10px; padding: 20px; text-align: center;
    }
    .distress-box p { font-size: 13px; color: #666; margin-bottom: 10px; }
    .countdown { font-size: 44px; font-weight: 800; color: #dc2626; line-height: 1; }

    .locate-btn {
      position: absolute; bottom: 0; right: 16px; z-index: 999;
      width: 42px; height: 42px; border-radius: 50%;
      background: #fff; border: none; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s;
    }
    .locate-btn svg { width: 20px; height: 20px; stroke: #111; fill: none; stroke-width: 2; }
    .locate-btn:active { transform: scale(0.92); }

    .leaflet-control-attribution { display: none !important; }
  </style>
</head>
<body>
  <div id="map"></div>

  <button class="locate-btn" id="btnLocate" title="My location">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
  </button>

  <div class="top-bar" id="topBar">
    <div class="search-card" id="searchCard">
      <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" id="searchInput" placeholder="From: search start address (or tap map)" autocomplete="off" />
      <button class="search-clear" id="searchClear">&times;</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="bottom-sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheetContent">
      <div id="stateIdle">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="width:26px;height:26px;border-radius:6px;background:#111;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">L</div>
          <span style="font-size:16px;font-weight:700;color:#111">Louise</span>
        </div>
        <p style="font-size:13px;color:#888;line-height:1.5;margin-bottom:8px" id="idleHint">
          Set <strong style="color:#111">From</strong> and <strong style="color:#111">To</strong>, then request a drone escort.
        </p>
        <div class="loc-row">
          <div class="loc-dot origin"></div>
          <span class="loc-label placeholder" id="originLabel">From: not set</span>
          <button type="button" class="loc-change" id="btnShareLocation">Share location</button>
        </div>
        <div class="loc-row" style="margin-top:2px">
          <div class="loc-dot dest"></div>
          <span class="loc-label placeholder" id="destLabelIdle">To: search above or tap map</span>
        </div>
      </div>

      <div id="stateRoute" style="display:none">
        <div class="loc-row">
          <div class="loc-dot origin"></div>
          <span class="loc-label" id="routeOriginLabel">Your location</span>
          <button class="loc-change" id="btnChangeOrigin">Change</button>
        </div>
        <div class="loc-row">
          <div class="loc-dot dest"></div>
          <span class="loc-label" id="routeDestLabel">Destination</span>
          <button class="loc-change" id="btnChangeDest">Change</button>
        </div>
        <div class="route-info" id="routeInfo"></div>
        <button class="btn btn-primary" id="btnRequest">Request drone escort</button>
      </div>

      <div id="statePlanned" style="display:none">
        <div class="eta-card">
          <div class="eta-time" id="etaTime">--</div>
          <div class="eta-label" id="etaLabel">Drone arrives in</div>
        </div>
        <div class="route-info" id="plannedInfo" style="font-size:12px"></div>
        <button class="btn btn-go" id="btnGo">Start walking</button>
        <button class="btn btn-outline" id="btnCancelPlan">Cancel</button>
      </div>

      <div id="stateActive" style="display:none">
        <div class="drone-card" id="droneCard">
          <span class="pulse-dot"></span>
          <div style="flex:1">
            <div class="drone-text" id="droneText">Connecting...</div>
            <div class="drone-sub" id="droneSub"></div>
          </div>
          <span class="live-badge" id="liveBadge" style="display:none">Live</span>
        </div>
        <button class="btn btn-danger" id="btnDistress">I need help</button>
        <button class="btn btn-primary" id="btnArrived">I've arrived — send drone home</button>
        <button class="btn btn-outline" id="btnCancel">I'm safe — cancel</button>
      </div>

      <div id="stateDistress" style="display:none">
        <div class="distress-box">
          <p><strong>Alert sent.</strong> Dismiss within 15 seconds or emergency services will be contacted.</p>
          <div class="countdown" id="countdown">15</div>
          <button class="btn" style="background:#111;color:#fff;margin-top:12px" id="btnDismiss">I'm safe — cancel alert</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function loadMapThenApp() {
      function run() {
    const HUB = [48.8606, 2.3376];
    const PARIS = [48.8566, 2.3522];

    const map = L.map('map', { zoomControl: false }).setView(PARIS, 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    const hubIcon = L.divIcon({
      className: '',
      html: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V10.5z" fill="#111" stroke="#fff" stroke-width="1.5"/><rect x="9" y="14" width="6" height="7" rx="0.5" fill="#fff"/></svg>`,
      iconSize: [22, 22], iconAnchor: [11, 19],
    });
    L.marker(HUB, { icon: hubIcon }).addTo(map).bindPopup('<strong>Louise Drone Centre</strong><br>Louvre, Paris');

    let origin = null, dest = null;
    let destDisplayName = '';
    let originMarker = null, destMarker = null;
    let routeLayer = null, approachLayer = null, escortLayer = null, returnLayer = null;
    let droneMarker = null, ws = null;
    let routeCoords = null;
    let missionStats = null;
    let countdownInterval = null;
    let watchId = null;
    let lastPositionSend = 0;

    const states = ['stateIdle', 'stateRoute', 'statePlanned', 'stateActive', 'stateDistress'];
    function showState(id) {
      states.forEach(s => document.getElementById(s).style.display = s === id ? '' : 'none');
      repositionLocateBtn();
    }

    function repositionLocateBtn() {
      const sheet = document.getElementById('sheet');
      const btn = document.getElementById('btnLocate');
      const h = sheet.offsetHeight;
      btn.style.bottom = (h + 12) + 'px';
    }
    window.addEventListener('resize', repositionLocateBtn);
    setTimeout(repositionLocateBtn, 100);

    function updateIdleHint() {
      const hint = document.getElementById('idleHint');
      if (!hint) return;
      if (origin && dest) hint.innerHTML = 'From and To set. Request drone escort below.';
      else if (origin) hint.innerHTML = 'From set. Now set <strong style="color:#111">To</strong>: search above or tap the map.';
      else hint.innerHTML = 'Set <strong style="color:#111">From</strong> and <strong style="color:#111">To</strong>, then request a drone escort.';
    }

    function updateSearchPlaceholder() {
      searchInput.placeholder = origin
        ? 'To: where are you going? (search or tap map)'
        : 'From: search start address (or tap map)';
    }

    async function reverseGeocode(lat, lng) {
      try {
        const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=18`, {
          headers: { 'User-Agent': 'LouiseWalkHome/1.0' }
        });
        const data = await resp.json();
        const parts = (data.display_name || '').split(',');
        return parts.slice(0, 3).join(',').trim() || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      } catch { return `${lat.toFixed(5)}, ${lng.toFixed(5)}`; }
    }

    function shareLocation() {
      const lbl = document.getElementById('originLabel');
      lbl.textContent = 'Getting location...';
      lbl.classList.remove('placeholder');
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          origin = [pos.coords.latitude, pos.coords.longitude];
          placeOrigin(origin);
          const name = await reverseGeocode(origin[0], origin[1]);
          lbl.textContent = name;
          map.setView(origin, 15);
          updateIdleHint();
          updateSearchPlaceholder();
        },
        () => {
          lbl.textContent = 'From: not set';
          lbl.classList.add('placeholder');
          updateIdleHint();
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    document.getElementById('btnShareLocation').onclick = () => shareLocation();
    document.getElementById('btnLocate').onclick = () => shareLocation();

    function placeOrigin(latlng) {
      if (originMarker) map.removeLayer(originMarker);
      originMarker = L.marker(latlng, {
        icon: L.divIcon({
          className: '',
          html: '<div style="width:14px;height:14px;background:#111;border:3px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.2)"></div>',
          iconSize: [14, 14], iconAnchor: [7, 7],
        }),
        zIndexOffset: 500,
      }).addTo(map);
    }

    function placeDest(latlng) {
      dest = latlng;
      if (destMarker) map.removeLayer(destMarker);
      destMarker = L.marker(latlng, {
        icon: L.divIcon({
          className: '',
          html: '<div style="width:12px;height:12px;background:#555;border:3px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.2)"></div>',
          iconSize: [12, 12], iconAnchor: [6, 6],
        }),
      }).addTo(map);
    }

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const searchClear = document.getElementById('searchClear');
    let searchTimeout = null;

    async function applyAddressAsFromOrTo(lat, lng, displayName) {
      searchInput.value = '';
      searchResults.style.display = 'none';
      searchClear.style.display = 'none';
      map.flyTo([lat, lng], 15, { duration: 0.8 });
      if (!origin) {
        origin = [lat, lng];
        placeOrigin(origin);
        document.getElementById('originLabel').textContent = displayName;
        document.getElementById('originLabel').classList.remove('placeholder');
        updateIdleHint();
        updateSearchPlaceholder();
        return;
      }
      placeDest([lat, lng]);
      destDisplayName = displayName;
      document.getElementById('destLabelIdle').textContent = displayName;
      document.getElementById('destLabelIdle').classList.remove('placeholder');
      updateIdleHint();
      fetchRoute();
    }

    searchInput.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const first = searchResults.querySelector('.search-result');
      if (first && first.dataset.lat) {
        const lat = parseFloat(first.dataset.lat);
        const lng = parseFloat(first.dataset.lng);
        const name = first.querySelector('.sr-name')?.textContent || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        applyAddressAsFromOrTo(lat, lng, name);
        return;
      }
      const q = searchInput.value.trim();
      if (q.length < 2) return;
      searchResults.innerHTML = '<div class="search-status">Searching...</div>';
      searchResults.style.display = 'block';
      try {
        const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=1`, {
          headers: { 'Accept': 'application/json', 'User-Agent': 'LouiseWalkHome/1.0' }
        });
        const results = await resp.json();
        if (!results || !results.length) {
          searchResults.innerHTML = '<div class="search-status">No results. Try a different address or tap the map.</div>';
          return;
        }
        const r = results[0];
        const lat = parseFloat(r.lat);
        const lng = parseFloat(r.lon);
        const parts = (r.display_name || '').split(',');
        const displayName = parts.slice(0, 3).join(',').trim() || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        applyAddressAsFromOrTo(lat, lng, displayName);
      } catch (err) {
        searchResults.innerHTML = '<div class="search-status">Search failed. Check connection or tap the map.</div>';
      }
    });

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const q = searchInput.value.trim();
      searchClear.style.display = q ? 'block' : 'none';
      if (q.length < 2) { searchResults.style.display = 'none'; return; }
      searchResults.innerHTML = '<div class="search-status">Searching...</div>';
      searchResults.style.display = 'block';
      searchTimeout = setTimeout(async () => {
        try {
          const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`, {
            headers: { 'Accept': 'application/json', 'User-Agent': 'LouiseWalkHome/1.0' }
          });
          const results = await resp.json();
          if (!results || !results.length) {
            searchResults.innerHTML = '<div class="search-status">No results. Try a place name or full address.</div>';
            return;
          }
          searchResults.innerHTML = results.map((r, i) => {
            const parts = (r.display_name || '').split(',');
            const name = parts[0].trim();
            const addr = parts.slice(1, 4).join(',').trim();
            return `<div class="search-result" data-idx="${i}" data-lat="${r.lat}" data-lng="${r.lon}">
              <span class="sr-icon">&bull;</span>
              <div><div class="sr-name">${name}</div><div class="sr-addr">${addr}</div></div>
            </div>`;
          }).join('');
          searchResults.style.display = 'block';
        } catch (err) {
          searchResults.innerHTML = '<div class="search-status">Search failed.</div>';
        }
      }, 400);
    });

    searchResults.addEventListener('click', (e) => {
      const el = e.target.closest('.search-result');
      if (!el || !el.dataset.lat) return;
      const lat = parseFloat(el.dataset.lat);
      const lng = parseFloat(el.dataset.lng);
      if (isNaN(lat) || isNaN(lng)) return;
      const name = el.querySelector('.sr-name')?.textContent || '';
      applyAddressAsFromOrTo(lat, lng, name);
    });

    searchClear.onclick = () => {
      searchInput.value = '';
      searchResults.style.display = 'none';
      searchClear.style.display = 'none';
      searchInput.focus();
    };

    map.on('click', async (e) => {
      if (document.getElementById('stateActive').style.display !== 'none') return;
      if (document.getElementById('statePlanned').style.display !== 'none') return;
      if (!origin) {
        origin = [e.latlng.lat, e.latlng.lng];
        placeOrigin(origin);
        document.getElementById('originLabel').textContent = 'Getting address...';
        const name = await reverseGeocode(origin[0], origin[1]);
        document.getElementById('originLabel').textContent = name;
        document.getElementById('originLabel').classList.remove('placeholder');
        updateIdleHint();
        updateSearchPlaceholder();
        return;
      }
      placeDest([e.latlng.lat, e.latlng.lng]);
      document.getElementById('destLabelIdle').textContent = 'Getting address...';
      const name = await reverseGeocode(e.latlng.lat, e.latlng.lng);
      destDisplayName = name;
      document.getElementById('destLabelIdle').textContent = name;
      document.getElementById('destLabelIdle').classList.remove('placeholder');
      searchInput.value = '';
      searchClear.style.display = 'none';
      updateIdleHint();
      fetchRoute();
    });

    async function fetchRoute() {
      if (!origin || !dest) return;
      const routeInfoEl = document.getElementById('routeInfo');
      try {
        routeInfoEl.innerHTML = '<span style="color:#888">Getting route...</span>';
        showState('stateRoute');
        const resp = await fetch('/api/route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ origin, destination: dest }),
        });
        const data = await resp.json();
        if (!data.coords || data.coords.length < 2) {
          routeInfoEl.innerHTML = '';
          showState('stateIdle');
          alert(data.detail || data.error || 'Could not get a route. Try two places in the same region.');
          return;
        }
        routeCoords = data.coords;
        const latlngs = data.coords.map(c => [c[1], c[0]]);
        if (routeLayer) map.removeLayer(routeLayer);
        routeLayer = L.polyline(latlngs, { color: '#111', weight: 4, opacity: 0.6 }).addTo(map);
        map.fitBounds(routeLayer.getBounds(), { padding: [60, 120] });

        const distM = data.distance_m != null ? data.distance_m : haversine(origin, dest);
        const walkMin = data.duration_s != null ? Math.round(data.duration_s / 60) : Math.max(1, Math.round(distM / 80));

        document.getElementById('routeOriginLabel').textContent =
          document.getElementById('originLabel').textContent || `${origin[0].toFixed(4)}, ${origin[1].toFixed(4)}`;
        document.getElementById('routeDestLabel').textContent = destDisplayName || `${dest[0].toFixed(4)}, ${dest[1].toFixed(4)}`;

        const note = data.source === 'fallback' && data.detail
          ? '<br><span style="font-size:11px;color:#b45309">' + data.detail + '</span>'
          : '<br><span style="font-size:11px;color:#999">A drone will watch over you the entire way</span>';
        routeInfoEl.innerHTML = `
          <strong>Walking route</strong><br>
          ${(distM / 1000).toFixed(1)} km &middot; ~${walkMin} min walk
          ${note}
        `;

        showState('stateRoute');
      } catch (e) {
        console.error('Route error:', e);
        routeInfoEl.innerHTML = '';
        showState('stateIdle');
        alert('Route request failed.');
      }
    }

    document.getElementById('btnRequest').onclick = async () => {
      const btn = document.getElementById('btnRequest');
      btn.disabled = true;
      btn.textContent = 'Planning...';
      try {
        const resp = await fetch('/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ origin, destination: dest, route: routeCoords || null }),
        });
        const data = await resp.json();
        if (data.detail || data.error) throw new Error(data.detail || data.error);

        missionStats = data.stats;

        if (data.routes) {
          [approachLayer, escortLayer, returnLayer].forEach(l => { if (l) map.removeLayer(l); });
          approachLayer = L.polyline(data.routes.approach, { color: '#888', weight: 2, dashArray: '6,4', opacity: 0.5 }).addTo(map);
          escortLayer   = L.polyline(data.routes.escort,   { color: '#111', weight: 3, opacity: 0.7 }).addTo(map);
          returnLayer   = L.polyline(data.routes['return'], { color: '#aaa', weight: 2, dashArray: '4,4', opacity: 0.4 }).addTo(map);
        }

        const etaMin = Math.max(1, Math.ceil((data.approach_eta_s || 0) / 60));
        document.getElementById('etaTime').textContent = `~${etaMin} min`;
        document.getElementById('etaLabel').textContent = 'Drone arrives in';

        const s = data.stats || {};
        document.getElementById('plannedInfo').innerHTML = `
          <strong>${s.total_waypoints} waypoints</strong> generated<br>
          Approach (${s.approach_wp} wp) &rarr; Escort (${s.escort_wp} wp) &rarr; Return (${s.return_wp} wp)<br>
          Total flight: ~${Math.round((s.estimated_flight_time_s||0)/60)} min &middot; ${s.total_distance_m}m
        `;

        showState('statePlanned');
      } catch (e) {
        alert('Failed: ' + e.message);
      }
      btn.disabled = false;
      btn.textContent = 'Request drone escort';
    };

    document.getElementById('btnGo').onclick = async () => {
      const btn = document.getElementById('btnGo');
      btn.disabled = true;
      btn.textContent = 'Starting ArduPilot...';
      try {
        const resp = await fetch('/api/mission/start', { method: 'POST' });
        const data = await resp.json();
        if (data.detail) throw new Error(data.detail);
        showState('stateActive');
        document.getElementById('droneText').textContent = 'Arming...';
        document.getElementById('droneSub').textContent = '';
        document.getElementById('liveBadge').style.display = 'none';
        startLiveTracking();
      } catch (e) {
        alert('Launch failed: ' + e.message);
      }
      btn.disabled = false;
      btn.textContent = 'Start walking';
    };

    document.getElementById('btnCancelPlan').onclick = () => {
      [approachLayer, escortLayer, returnLayer].forEach(l => { if (l) map.removeLayer(l); });
      showState('stateRoute');
    };

    document.getElementById('btnChangeOrigin').onclick = () => {
      origin = null;
      if (originMarker) { map.removeLayer(originMarker); originMarker = null; }
      document.getElementById('originLabel').textContent = 'From: not set';
      document.getElementById('originLabel').classList.add('placeholder');
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      searchInput.value = '';
      updateSearchPlaceholder();
      searchInput.focus();
      showState('stateIdle');
      updateIdleHint();
    };
    document.getElementById('btnChangeDest').onclick = () => {
      dest = null;
      destDisplayName = '';
      if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      document.getElementById('destLabelIdle').textContent = 'To: search above or tap map';
      document.getElementById('destLabelIdle').classList.add('placeholder');
      searchInput.value = '';
      updateSearchPlaceholder();
      searchInput.focus();
      showState('stateIdle');
      updateIdleHint();
    };

    function connectWebSocket() {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' })); }, 20000);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'position') {
          updateDrone(msg);
          if (document.getElementById('stateActive').style.display !== 'none' && msg.source === 'ardupilot') {
            document.getElementById('liveBadge').style.display = 'inline-block';
            document.getElementById('liveBadge').textContent = 'Live';
          }
        } else if (msg.type === 'phase') {
          if (document.getElementById('stateActive').style.display !== 'none') {
            document.getElementById('droneText').textContent = phaseLabel(msg.phase);
          }
        } else if (msg.type === 'mission_started') {
          if (document.getElementById('stateActive').style.display !== 'none' ||
              document.getElementById('statePlanned').style.display !== 'none') {
            showState('stateActive');
            document.getElementById('droneText').textContent = 'Mission started';
            document.getElementById('droneSub').textContent = '';
            startLiveTracking();
          }
        } else if (msg.type === 'sitl_status') {
          if (document.getElementById('statePlanned').style.display !== 'none' ||
              document.getElementById('stateActive').style.display !== 'none') {
            const btn = document.getElementById('btnGo');
            if (msg.status === 'starting') btn.textContent = 'Starting SITL...';
            else if (msg.status === 'running') btn.textContent = 'SITL ready — launching...';
          }
        } else if (msg.type === 'complete') {
          stopLiveTracking();
          document.getElementById('droneText').textContent = 'Mission complete';
          document.getElementById('droneSub').textContent = 'Drone returned to hub';
          document.getElementById('liveBadge').style.display = 'none';
          if (droneMarker) setTimeout(() => { if (droneMarker) { map.removeLayer(droneMarker); droneMarker = null; } }, 5000);
        }
      };

      ws.onclose = () => {
        document.getElementById('liveBadge').style.display = 'none';
        setTimeout(connectWebSocket, 3000);
      };
    }
    connectWebSocket();

    const droneIcon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:#22c55e;border:2.5px solid #111;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3);animation:dronePulse 1.2s infinite"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7],
    });

    function updateDrone(msg) {
      if (msg.lat == null || msg.lng == null) return;
      if (!droneMarker) {
        droneMarker = L.marker([msg.lat, msg.lng], { icon: droneIcon, zIndexOffset: 1000 }).addTo(map);
      } else {
        droneMarker.setLatLng([msg.lat, msg.lng]);
      }
      document.getElementById('droneText').textContent = phaseLabel(msg.phase) || '—';
      const tw = msg.total_waypoints; const wi = msg.waypoint_index;
      const pct = (typeof tw === 'number' && typeof wi === 'number' && tw > 0) ? Math.round((wi / tw) * 100) : null;
      const altText = (msg.alt != null && !isNaN(msg.alt)) ? ' · ' + Math.round(msg.alt) + 'm' : '';
      document.getElementById('droneSub').textContent = (pct != null ? pct + '% complete' : '—') + altText;
      if (document.getElementById('stateActive').style.display !== 'none' && map.getZoom() >= 14) {
        const dronePos = L.latLng(msg.lat, msg.lng);
        if (!map.getBounds().contains(dronePos)) map.panTo(dronePos, { animate: true, duration: 0.5 });
      }
    }

    function phaseLabel(p) {
      return { approach: 'Drone approaching', escort: 'Drone escorting you', 'return': 'Drone returning to hub' }[p] || (p ? String(p).replace(/_/g, ' ') : '');
    }

    function startLiveTracking() {
      if (watchId != null) return;
      if (!navigator.geolocation) return;
      watchId = navigator.geolocation.watchPosition(
        function (pos) {
          if (ws && ws.readyState === WebSocket.OPEN) {
            var now = Date.now();
            if (now - lastPositionSend < 800) return;
            lastPositionSend = now;
            ws.send(JSON.stringify({ type: 'user_position', lat: pos.coords.latitude, lng: pos.coords.longitude }));
          }
        },
        function () { },
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 5000 }
      );
    }

    function stopLiveTracking() {
      if (watchId != null && navigator.geolocation) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
    }

    document.getElementById('btnDistress').onclick = () => {
      showState('stateDistress');
      startCountdown();
      if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
    };

    document.getElementById('btnCancel').onclick = () => {
      stopLiveTracking();
      if (ws) ws.close();
      ws = null;
      [approachLayer, escortLayer, returnLayer, routeLayer].forEach(l => { if (l) map.removeLayer(l); });
      if (droneMarker) { map.removeLayer(droneMarker); droneMarker = null; }
      showState('stateIdle');
    };

    document.getElementById('btnArrived').onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'user_arrived' }));
        stopLiveTracking();
        document.getElementById('droneText').textContent = 'Drone returning to hub';
        document.getElementById('droneSub').textContent = 'Sent — drone heading home';
      }
    };

    document.getElementById('btnDismiss').onclick = () => {
      clearInterval(countdownInterval);
      showState('stateActive');
    };

    let countdownLeft = 15;
    function startCountdown() {
      countdownLeft = 15;
      document.getElementById('countdown').textContent = countdownLeft;
      countdownInterval = setInterval(() => {
        countdownLeft--;
        document.getElementById('countdown').textContent = countdownLeft;
        if (countdownLeft <= 0) {
          clearInterval(countdownInterval);
          document.getElementById('countdown').textContent = 'SENT';
          if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'emergency', origin }));
          setTimeout(() => {
            showState('stateActive');
            document.getElementById('droneCard').style.background = '#fff';
            document.getElementById('droneCard').style.borderColor = '#dc2626';
            document.getElementById('droneText').textContent = 'Emergency — drone locked on position';
            document.getElementById('droneText').style.color = '#dc2626';
          }, 1500);
        }
      }, 1000);
    }

    function haversine([lat1, lng1], [lat2, lng2]) {
      const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
      }
      if (window.L) { run(); return; }
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.async = false;
      s.onload = run;
      s.onerror = function() {
        var el = document.getElementById('map');
        if (el) el.innerHTML = '<div style="padding:24px;text-align:center;font-size:14px;color:#888">Loading map...</div>';
      };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
